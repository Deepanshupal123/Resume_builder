<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ResumeAI</title>

    <!-- ── Google Fonts: Geist + Inter ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- ── Material Symbols Outlined (icons) ── -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />

    <!-- ── Tailwind CSS ── -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- ── Tailwind Config (Stitch design tokens) ── -->
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              /* surfaces */
              'surface':                    '#111318',
              'surface-dim':                '#111318',
              'surface-bright':             '#37393e',
              'surface-container-lowest':   '#0c0e13',
              'surface-container-low':      '#191c20',
              'surface-container':          '#1d2024',
              'surface-container-high':     '#282a2f',
              'surface-container-highest':  '#33353a',
              /* on-surface */
              'on-surface':                 '#e2e2e8',
              'on-surface-variant':         '#bfc7d4',
              'inverse-surface':            '#e2e2e8',
              'inverse-on-surface':         '#2e3035',
              /* outline */
              'outline':                    '#8a919e',
              'outline-variant':            '#404752',
              /* primary */
              'primary':                    '#a0caff',
              'on-primary':                 '#003259',
              'primary-container':          '#2294f4',
              'on-primary-container':       '#002b4e',
              'inverse-primary':            '#0061a5',
              'primary-fixed':              '#d2e4ff',
              'primary-fixed-dim':          '#a0caff',
              'on-primary-fixed':           '#001c37',
              'on-primary-fixed-variant':   '#00497e',
              /* secondary */
              'secondary':                  '#d2bbff',
              'on-secondary':               '#3f008e',
              'secondary-container':        '#6001d1',
              'on-secondary-container':     '#c9aeff',
              'secondary-fixed':            '#eaddff',
              'secondary-fixed-dim':        '#d2bbff',
              'on-secondary-fixed':         '#25005a',
              'on-secondary-fixed-variant': '#5a00c6',
              /* tertiary */
              'tertiary':                   '#4cd7f6',
              'on-tertiary':                '#003640',
              'tertiary-container':         '#009eb9',
              'on-tertiary-container':      '#002f38',
              'tertiary-fixed':             '#acedff',
              'tertiary-fixed-dim':         '#4cd7f6',
              'on-tertiary-fixed':          '#001f26',
              'on-tertiary-fixed-variant':  '#004e5c',
              /* error */
              'error':                      '#ffb4ab',
              'on-error':                   '#690005',
              'error-container':            '#93000a',
              'on-error-container':         '#ffdad6',
              /* background */
              'background':                 '#111318',
              'on-background':              '#e2e2e8',
              'surface-variant':            '#33353a',
              /* special */
              'surface-tint':               '#a0caff',
              'success-green':              '#2ECC71',
              'indigo-gradient-start':      '#4F46E5',
              'cyan-gradient-end':          '#06B6D4',
              'violet-gradient-middle':     '#7C3AED',
              'glass-bg':                   'rgba(255,255,255,0.07)',
              'glass-dark-bg':              'rgba(12,14,19,0.85)',
            },
            fontFamily: {
              'sans':        ['Inter', 'sans-serif'],
              'display':     ['Geist', 'sans-serif'],
              'display-lg':  ['Geist', 'sans-serif'],
              'headline-md': ['Geist', 'sans-serif'],
              'body-md':     ['Inter', 'sans-serif'],
              'body-lg':     ['Inter', 'sans-serif'],
              'button-text': ['Geist', 'sans-serif'],
              'label-caps':  ['Geist', 'sans-serif'],
            },
            fontSize: {
              'display-lg':  ['48px', { lineHeight: '56px', letterSpacing: '-0.02em', fontWeight: '700' }],
              'headline-md': ['24px', { lineHeight: '32px', letterSpacing: '-0.01em', fontWeight: '600' }],
              'body-lg':     ['18px', { lineHeight: '28px', fontWeight: '400' }],
              'body-md':     ['16px', { lineHeight: '24px', fontWeight: '400' }],
              'button-text': ['14px', { lineHeight: '20px', fontWeight: '500' }],
              'label-caps':  ['12px', { lineHeight: '16px', letterSpacing: '0.05em', fontWeight: '600' }],
            },
            borderRadius: {
              'DEFAULT': '0.5rem',
              'sm':      '0.25rem',
              'md':      '0.75rem',
              'lg':      '1rem',
              'xl':      '1.5rem',
              '2xl':     '1.75rem',
              '3xl':     '2rem',
              'full':    '9999px',
            },
            spacing: {
              'base':                 '8px',
              'gutter':           '24px',
              'margin-desktop':   '48px',
              'margin-mobile':    '16px',
              'sidebar-width':    '280px',
              'container-max':    '1440px',
            },
            backgroundImage: {
              'gradient-primary': 'linear-gradient(135deg, #4F46E5, #06B6D4)',
              'gradient-hero':    'linear-gradient(135deg, rgba(79,70,229,0.12), rgba(6,182,212,0.08))',
            },
            boxShadow: {
              'glow-primary':   '0 0 20px rgba(160,202,255,0.15)',
              'glow-secondary': '0 0 20px rgba(124,58,237,0.15)',
              'glass':          '0 8px 32px 0 rgba(0,0,0,0.4)',
            },
          },
        },
      }
    </script>

    <!-- ── Global styles ── -->
    <style>
      /* Material Symbols config */
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        vertical-align: middle;
      }

      /* Glassmorphism card */
      .glass-card {
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      }

      /* Gradient border trick */
      .gradient-border {
        position: relative;
        background: rgba(255, 255, 255, 0.04);
        background-clip: padding-box;
        border: 1px solid transparent;
      }
      .gradient-border::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        background: linear-gradient(135deg, #4F46E5, #06B6D4);
        z-index: -1;
      }

      /* AI glow */
      .ai-glow {
        box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
      }

      /* Floating score bounce */
      @keyframes bounce-slow {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-8px); }
      }
      .animate-bounce-slow {
        animation: bounce-slow 4s ease-in-out infinite;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar       { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #404752; border-radius: 10px; }

      /* Smooth page transitions */
      * { box-sizing: border-box; }

      /* Selection color */
      ::selection {
        background: rgba(160, 202, 255, 0.2);
        color: #e2e2e8;
      }

      /* Base body — always dark */
      body {
        background-color: #111318;
        color: #e2e2e8;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        padding: 0;
      }

      /* Remove default button/input styles */
      button { font-family: inherit; }
      input  { font-family: inherit; }

      /* Template card overlay — needs CSS hover since React inline can't do :hover on child */
      .tmpl-card-overlay {
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      .tmpl-card:hover .tmpl-card-overlay {
        opacity: 1;
      }
      .tmpl-card {
        transition: border-color 0.15s ease, transform 0.15s ease;
      }
      .tmpl-card:hover {
        border-color: #a0caff !important;
        transform: translateY(-3px);
      }

      /* Tool card hover */
      .tool-card {
        transition: transform 0.15s ease, background 0.15s ease;
      }
      .tool-card:hover {
        transform: translateY(-3px);
      }

      /* Sidebar nav item hover */
      .nav-item {
        transition: background 0.15s ease, color 0.15s ease;
      }
      .nav-item:hover {
        background: rgba(160, 202, 255, 0.06) !important;
        color: #a0caff !important;
      }

      /* Stat card hover */
      .stat-card {
        transition: border-color 0.15s ease, transform 0.15s ease;
      }
      .stat-card:hover {
        border-color: rgba(160, 202, 255, 0.3) !important;
        transform: translateY(-2px);
      }

      /* Table row hover */
      .resume-row {
        transition: background 0.15s ease;
      }
      .resume-row:hover {
        background: rgba(255, 255, 255, 0.03);
      }
      .resume-row .edit-btn {
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      .resume-row:hover .edit-btn {
        opacity: 1;
      }

      /* Input focus */
      .search-input:focus {
        outline: none;
        border-color: rgba(160, 202, 255, 0.4) !important;
        box-shadow: 0 0 0 3px rgba(160, 202, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
